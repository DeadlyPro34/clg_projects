<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Reset Complete - Bokify</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: white; padding: 40px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 400px; width: 100%; text-align: center; }
        h3 { color: #333; margin-bottom: 20px; }
        p { color: #666; font-size: 15px; margin-bottom: 30px; }
        a { display: inline-block; padding: 10px 20px; background-color: #00ffcc; color: #111; text-decoration: none; border-radius: 4px; font-weight: bold; transition: 0.3s; }
        a:hover { background-color: #00cc99; }
    </style>
</head>
<body>
    <div class="container">
        <h3>Password Reset Complete</h3>
        <p>Your password has been set. You may go ahead and log in now.</p>
        <a href="{% url 'login_page' %}">Log In</a>
    </div>
</body>
</html>
