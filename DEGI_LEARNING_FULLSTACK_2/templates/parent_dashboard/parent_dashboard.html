{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parent Dashboard - Bokify</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00f5c4; /* Mint accent */
            --bg-dark: #0f111a;
            --surface: #1a1d27;
            --surface-light: #2e3250;
            --text-main: #e2e8f0;
            --text-muted: #94a3b8;
            --border: #334155;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Geist', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            line-height: 1.6;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        /* --- Header --- */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 700;
            font-size: 1.5rem;
            color: white;
            text-decoration: none;
        }

        .logo img { height: 35px; }

        .btn {
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            border: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
        }

        .btn-mint {
            background-color: var(--primary);
            color: #000;
        }

        .btn-mint:hover { background-color: #00cc99; transform: translateY(-2px); }

        /* --- Child Sections --- */
        .child-section {
            margin-bottom: 60px;
        }

        .child-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
        }

        .child-avatar {
            width: 50px;
            height: 50px;
            background: var(--surface-light);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary);
            font-size: 1.5rem;
        }

        .child-name { font-size: 1.8rem; font-weight: 700; }

        /* --- Course Grid --- */
        .course-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 25px;
        }

        .course-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 25px;
            transition: var(--transition);
        }

        .course-card:hover { border-color: var(--primary); background: #1f2330; }

        .course-title { font-size: 1.25rem; font-weight: 600; margin-bottom: 15px; }

        .stat-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .progress-container {
            height: 8px;
            background: var(--surface-light);
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        .progress-bar {
            height: 100%;
            background: var(--primary);
            width: 0%;
            transition: width 1s ease-out;
        }

        .time-spent {
            font-family: 'JetBrains Mono', monospace;
            padding: 4px 8px;
            background: #232a3d;
            border-radius: 4px;
            color: var(--primary);
            font-size: 0.85rem;
        }

        /* --- Empty State / Link --- */
        .empty-state {
            text-align: center;
            padding: 60px;
            background: var(--surface);
            border-radius: 20px;
            border: 2px dashed var(--border);
        }

        .link-modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .modal-content {
            background: var(--surface);
            padding: 40px;
            border-radius: 20px;
            width: 90%;
            max-width: 450px;
            border: 1px solid var(--primary);
        }

        .modal-content input {
            width: 100%;
            padding: 12px;
            background: var(--surface-light);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: white;
            margin: 20px 0;
            font-size: 1.1rem;
            text-align: center;
            letter-spacing: 2px;
        }

        .modal-content h3 { margin-bottom: 10px; }

        #loading-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-dark);
            display: flex; justify-content: center; align-items: center;
            z-index: 1000;
        }

        .loader {
            width: 50px; height: 50px;
            border: 5px solid var(--surface-light);
            border-top: 5px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    </style>
</head>
<body>

    <div id="loading-screen"><div class="loader"></div></div>

    <div class="container">
        <header class="header">
            <a href="{% url 'index' %}" class="logo">
                <img src="{% static 'IMAGE/Black_book_logo.png' %}" alt="Logo">
                Bokify Parent
            </a>
            <div style="display: flex; gap: 15px;">
                <button class="btn btn-mint" onclick="toggleModal(true)">
                    <i class="fas fa-link"></i> Link Student
                </button>
                <a href="{% url 'logout' %}" class="btn" style="background: var(--surface-light); color: white;">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </a>
            </div>
        </header>

        <div id="parent-dashboard-content">
            <!-- Data will be injected here -->
        </div>
    </div>

    <!-- Link Student Modal -->
    <div class="link-modal" id="linkModal">
        <div class="modal-content">
            <h3>Link a Student</h3>
            <p style="color: var(--text-muted); font-size: 0.9rem;">Enter the 8-character code generated by your child from their dashboard.</p>
            <input type="text" id="linkCodeInput" placeholder="EX: XJ42K9LP" maxlength="8">
            <div id="modalError" style="color: #ff4d4d; font-size: 0.85rem; margin-bottom: 10px; display: none;"></div>
            <div style="display: flex; gap: 10px;">
                <button class="btn btn-mint" style="flex: 1;" onclick="linkStudent()">Connect</button>
                <button class="btn" style="background: var(--surface-light); color: white;" onclick="toggleModal(false)">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', fetchData);

        async function fetchData() {
            try {
                const response = await fetch('/api/parent/dashboard/');
                const data = await response.json();
                
                if (data.status === 'success') {
                    renderDashboard(data.children);
                } else {
                    alert(data.message || 'Error fetching dashboard data');
                }
            } catch (error) {
                console.error('Fetch error:', error);
            } finally {
                document.getElementById('loading-screen').style.display = 'none';
            }
        }

        function renderDashboard(children) {
            const container = document.getElementById('parent-dashboard-content');
            
            if (!children || children.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-user-plus" style="font-size: 3rem; color: var(--primary); margin-bottom: 20px;"></i>
                        <h2>No Students Linked Yet</h2>
                        <p style="color: var(--text-muted); margin-bottom: 30px;">
                            Link your child's account to monitor their learning progress, time spent, and course completion.
                        </p>
                        <button class="btn btn-mint" onclick="toggleModal(true)">Link Your First Student</button>
                    </div>
                `;
                return;
            }

            container.innerHTML = children.map(child => `
                <div class="child-section">
                    <div class="child-header">
                        <div class="child-avatar"><i class="fas fa-user-graduate"></i></div>
                        <h2 class="child-name">${child.child_name}</h2>
                    </div>
                    
                    <div class="course-grid">
                        ${child.enrolled_courses.length > 0 ? child.enrolled_courses.map(course => `
                            <div class="course-card">
                                <h3 class="course-title">${course.course_name}</h3>
                                <div class="stat-row">
                                    <span>Course Progress</span>
                                    <span style="color: var(--primary); font-weight: 700;">${course.progress_percent}%</span>
                                </div>
                                <div class="progress-container">
                                    <div class="progress-bar" style="width: ${course.progress_percent}%"></div>
                                </div>
                                <div class="stat-row">
                                    <span>Time Spent</span>
                                    <span class="time-spent">${course.time_spent_minutes} minutes</span>
                                </div>
                                <div class="stat-row" style="margin-top: 15px; border-top: 1px solid #333; padding-top: 10px;">
                                    <span>Last Activity</span>
                                    <span>${course.last_accessed}</span>
                                </div>
                            </div>
                        `).join('') : `
                            <div style="grid-column: 1/-1; color: var(--text-muted);">This student hasn't enrolled in any courses yet.</div>
                        `}
                    </div>
                </div>
            `).join('');
        }

        function toggleModal(show) {
            document.getElementById('linkModal').style.display = show ? 'flex' : 'none';
            if (!show) {
                document.getElementById('linkCodeInput').value = '';
                document.getElementById('modalError').style.display = 'none';
            }
        }

        async function linkStudent() {
            const input = document.getElementById('linkCodeInput');
            const errorDiv = document.getElementById('modalError');
            const code = input.value.trim();

            if (!code) {
                errorDiv.innerText = 'Please enter a code.';
                errorDiv.style.display = 'block';
                return;
            }

            try {
                const response = await fetch('/api/parent/connect-child/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ link_code: code })
                });
                
                const data = await response.json();
                
                if (data.status === 'success') {
                    toggleModal(false);
                    fetchData(); // Refresh dashboard
                } else {
                    errorDiv.innerText = data.message;
                    errorDiv.style.display = 'block';
                }
            } catch (error) {
                errorDiv.innerText = 'Server error. Try again later.';
                errorDiv.style.display = 'block';
            }
        }
    </script>
</body>
</html>
